---
name: Golangci-lint

on:  # yamllint disable-line rule:truthy
  workflow_call:

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - name: Install packages
        run: |
          apk update
          apk upgrade
          apk add git go golangci-lint openssh-keygen

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify
        run: |
          chown "$(id -u):$(id -g)" .
          echo "${{ vars.ALLOWED_SIGNERS }}" > "${HOME}/.signers"
          git -c gpg.ssh.allowedSignersFile="${HOME}/.signers" verify-commit HEAD

      - name: Prepare default config
        run: |
          if [ -f .golangci.yml ]; then
            exit 0
          fi

          cat >.golangci.yml <<EOF
          ---
          version: "2"

          linters:
            default: all
            disable:
              - cyclop
              - depguard
              - err113
              - exhaustruct
              - funcorder
              - gochecknoglobals
              - gochecknoinits
              - gocognit
              - godoclint
              - godox
              - ireturn
              - mnd
              - nlreturn
              - noctx
              - noinlineerr
              - nonamedreturns
              - prealloc
              - varnamelen
              - wrapcheck
              - wsl
              - wsl_v5
            settings:
              funlen:
                lines: 120
                statements: 60
                ignore-comments: true

              gocritic:
                enable-all: true
                disabled-checks:
                  - appendCombine
                  - equalFold
                  - ifElseChain
                  - paramTypeCombine
                  - regexpMust
                  - regexpSimplify
                  - sloppyLen
                  - unnamedResult

              nestif:
                min-complexity: 15

              perfsprint:
                error-format: false

              revive:
                severity: error
                enable-all-rules: true
                rules:
                  - name: argument-limit
                    arguments: [8]
                  - name: add-constant
                    disabled: true
                  - name: banned-characters
                    disabled: true
                  - name: confusing-naming
                    disabled: true
                  - name: cognitive-complexity
                    arguments: [60]
                    disabled: false
                  - name: cyclomatic
                    arguments: [60]
                    disabled: false
                  - name: exported
                    disabled: true
                  - name: file-header
                    disabled: true
                  - name: flag-parameter
                    disabled: true
                  - name: function-length
                    arguments: [100, 200]
                    disabled: false
                  - name: function-result-limit
                    arguments: [3]
                    disabled: false
                  - name: line-length-limit
                    arguments: [110]
                    disabled: false
                  - name: max-public-structs
                    arguments: [15]
                    disabled: false
                  - name: package-comments
                    disabled: true
                  - name: unnecessary-format
                    disabled: true
                  - name: unused-receiver
                    disabled: true
                  - name: use-errors-new
                    disabled: true
                  - name: var-naming
                    disabled: true

              staticcheck:
                checks:
                  - 'all'
                  - '-QF1003'
                  - '-ST1000'
                  - '-ST1020'

              tagliatelle:
                case:
                  rules:
                    json: kebab

          formatters:
            enable:
              - gci
              - gofmt
              - gofumpt
              - goimports
              - golines
              - swaggo
            settings:
              golines:
                max-len: 110
                reformat-tags: true
          EOF

      - name: Format
        run: |
          golangci-lint fmt --diff || true

      - name: Lint
        run: |
          golangci-lint run
